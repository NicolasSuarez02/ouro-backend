# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}

# Email (Resend)
resend.api.key=${RESEND_API_KEY:}
resend.from.email=noreply@ouro.com.ar

# URLs
app.frontend.url=${FRONTEND_URL}
app.backend.url=${BACKEND_URL}

# Upload de archivos
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Mercado Pago
mercadopago.sandbox=${MP_SANDBOX:true}
mercadopago.client-id=${MP_CLIENT_ID:}
mercadopago.client-secret=${MP_CLIENT_SECRET:}
mercadopago.access-token=${MP_ACCESS_TOKEN:}

# Zoom (Server-to-Server OAuth)
zoom.account-id=${ZOOM_ACCOUNT_ID}
zoom.client-id=${ZOOM_CLIENT_ID}
zoom.client-secret=${ZOOM_CLIENT_SECRET}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Encryption (AES-256 key, base64-encoded 32 bytes)
app.encryption.key=${ENCRYPTION_KEY}

# Logging
logging.level.org.springframework=INFO
logging.level.com.ouro=DEBUG
